<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <style>
      .h{font-size:22px;font-weight:700;fill:#1f4e9c}
      .s{font-size:13px;fill:#48506a}
      .t{font-size:15px;font-weight:700;fill:#10245c}
      .n{font-size:12px;fill:#1b2440}
      .q{font-size:12.5px;fill:#10245c}
    </style>
  </defs>
  <rect width="1080" height="560" fill="#ffffff"/>
  <text x="36" y="40" class="h">Cuaderno 01 &#183; Asociaci&#243;n frente a causa &#8212; flujo</text>
  <text x="36" y="62" class="s">de la delimitaci&#243;n conceptual a la evidencia emp&#237;rica de que correlaci&#243;n &#8800; causa</text>

  <rect x="36" y="86" width="1008" height="44" rx="8" fill="#eef1f7" stroke="#0b2a5b" stroke-width="1.5"/>
  <text x="52" y="113" class="q">Pregunta rectora: &#191;un modelo preciso y explicable basta para entender el fen&#243;meno? Se examina con cuatro experimentos.</text>

  <rect x="36" y="150" width="1008" height="78" rx="10" fill="#dbe7ff" stroke="#1f4e9c" stroke-width="1.6"/>
  <text x="52" y="174" class="t">Secci&#243;n 1 &#183; Definiciones y marco</text>
  <text x="52" y="196" class="n">Filosof&#237;a de la explicaci&#243;n: Hempel &#183; Salmon &#183; Woodward &#183; Pearl   |   Interpretabilidad vs explicabilidad vs causalidad</text>
  <text x="52" y="216" class="n">Taxonom&#237;a XAI (ante/post-hoc, local/global, agn&#243;stico)   |   Escalera de la causalidad: asociaci&#243;n &#8594; intervenci&#243;n &#8594; contrafactual</text>

  <line x1="540" y1="228" x2="540" y2="250" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="36" y="252" width="1008" height="116" rx="10" fill="#eaf4ea" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="52" y="276" class="t" fill="#226022">Secci&#243;n 2 &#183; Asociaci&#243;n frente a causa (cuatro experimentos con verdad conocida)</text>
  <rect x="52" y="288" width="232" height="64" rx="8" fill="#ffffff" stroke="#2e7d32"/>
  <text x="64" y="310" class="n" font-weight="700">2.1 Espuria</text>
  <text x="64" y="330" class="n">series indep. &#8594; r = 0.92</text>
  <rect x="296" y="288" width="232" height="64" rx="8" fill="#ffffff" stroke="#2e7d32"/>
  <text x="308" y="310" class="n" font-weight="700">2.2 Confusi&#243;n</text>
  <text x="308" y="330" class="n">&#946;: +0.79 &#8594; 0.00 al ajustar Z</text>
  <rect x="540" y="288" width="232" height="64" rx="8" fill="#ffffff" stroke="#2e7d32"/>
  <text x="552" y="310" class="n" font-weight="700">2.3 Simpson</text>
  <text x="552" y="330" class="n">la tendencia se invierte</text>
  <rect x="784" y="288" width="248" height="64" rx="8" fill="#ffffff" stroke="#2e7d32"/>
  <text x="796" y="310" class="n" font-weight="700">2.4 Colisionador</text>
  <text x="796" y="330" class="n">condicionar &#8594; r = &#8722;0.55 falsa</text>

  <line x1="540" y1="368" x2="540" y2="390" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="36" y="392" width="660" height="92" rx="10" fill="#fff1cc" stroke="#b8860b" stroke-width="1.6"/>
  <text x="52" y="416" class="t" fill="#8a6508">Secci&#243;n 3 &#183; Caso de estudio: German Credit</text>
  <text x="52" y="438" class="n">Log&#237;stica (interpretable) AUC 0.778  vs  Random Forest (caja negra) AUC 0.782</text>
  <text x="52" y="458" class="n">&#171;sin cuenta corriente&#187; predice mejor pago, sin ser una relaci&#243;n causal</text>
  <text x="52" y="476" class="n">importancia predictiva &#8800; efecto causal (nivel asociacional, Pearl)</text>

  <rect x="708" y="392" width="336" height="92" rx="10" fill="#eef1f7" stroke="#0b2a5b" stroke-width="1.6"/>
  <text x="724" y="416" class="t">Secci&#243;n 4 &#183; Implicaciones</text>
  <text x="724" y="438" class="n">riesgo alto &#183; costo asim&#233;trico 5:1</text>
  <text x="724" y="458" class="n">derecho a explicaci&#243;n &#183; auditor&#237;a</text>
  <text x="724" y="476" class="n">describe el modelo, no el mundo</text>

  <line x1="540" y1="484" x2="540" y2="506" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="36" y="508" width="1008" height="40" rx="8" fill="#eef1f7" stroke="#0b2a5b" stroke-width="1.5"/>
  <text x="52" y="533" class="q">Continuaci&#243;n &#8594; Cuaderno 02: construcci&#243;n y garant&#237;as de las explicaciones locales (SHAP y LIME).</text>
</svg>
