<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <style>
      .h{font-size:22px;font-weight:700;fill:#1f4e9c}
      .s{font-size:13px;fill:#48506a}
      .t{font-size:15px;font-weight:700;fill:#10245c}
      .n{font-size:12px;fill:#1b2440}
      .m{font-size:11.5px;font-style:italic;fill:#10245c}
      .q{font-size:12.5px;fill:#10245c}
    </style>
  </defs>
  <rect width="1080" height="600" fill="#ffffff"/>
  <text x="36" y="40" class="h">Cuaderno 03 &#183; Explicaciones globales y contrafactuales &#8212; flujo</text>
  <text x="36" y="62" class="s">del comportamiento promedio del modelo al cambio m&#237;nimo que altera una decisi&#243;n</text>

  <rect x="36" y="80" width="1008" height="42" rx="8" fill="#eef1f7" stroke="#0b2a5b" stroke-width="1.5"/>
  <text x="52" y="106" class="n">Secci&#243;n 0 &#183; Modelo de referencia: Pipeline (one-hot + XGBoost) sobre variables originales de German Credit</text>
  <line x1="540" y1="122" x2="540" y2="142" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- globales -->
  <rect x="36" y="144" width="660" height="250" rx="10" fill="#dbe7ff" stroke="#1f4e9c" stroke-width="1.6"/>
  <text x="52" y="168" class="t">Explicaciones GLOBALES (todo el modelo)</text>
  <rect x="52" y="180" width="306" height="92" rx="8" fill="#ffffff" stroke="#1f4e9c"/>
  <text x="64" y="202" class="t" fill="#1f4e9c">1 &#183; Importancia por permutaci&#243;n</text>
  <text x="64" y="222" class="m">ca&#237;da de desempe&#241;o al permutar X&#11388;</text>
  <text x="64" y="242" class="n">+ comparaci&#243;n con la importancia SHAP</text>
  <text x="64" y="260" class="n">cuidado: variables correlacionadas</text>
  <rect x="374" y="180" width="306" height="92" rx="8" fill="#ffffff" stroke="#1f4e9c"/>
  <text x="386" y="202" class="t" fill="#1f4e9c">2 &#183; PDP e ICE</text>
  <text x="386" y="222" class="m">f&#770;&#8347;(x&#8347;) = E[ f&#770;(x&#8347;, X&#7580;) ]</text>
  <text x="386" y="242" class="n">curva promedio (PDP) + individuales (ICE)</text>
  <text x="386" y="260" class="n">sesgo por extrapolaci&#243;n</text>
  <rect x="52" y="284" width="306" height="92" rx="8" fill="#ffffff" stroke="#1f4e9c"/>
  <text x="64" y="306" class="t" fill="#1f4e9c">3 &#183; ALE (efectos locales acumulados)</text>
  <text x="64" y="326" class="m">diferencias dentro de bins, acumuladas</text>
  <text x="64" y="346" class="n">no sesgado bajo correlaci&#243;n</text>
  <text x="64" y="364" class="n">ALE vs PDP lado a lado</text>
  <rect x="374" y="284" width="306" height="92" rx="8" fill="#ffffff" stroke="#1f4e9c"/>
  <text x="386" y="306" class="t" fill="#1f4e9c">4 &#183; Modelo sustituto global</text>
  <text x="386" y="326" class="m">&#225;rbol que imita a la caja negra</text>
  <text x="386" y="346" class="n">fidelidad R&#178; vs interpretabilidad</text>
  <text x="386" y="364" class="n">aproximaci&#243;n global</text>

  <!-- por ejemplo -->
  <rect x="712" y="144" width="332" height="250" rx="10" fill="#eaf4ea" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="728" y="168" class="t" fill="#226022">Explicaci&#243;n por EJEMPLO</text>
  <rect x="728" y="180" width="300" height="196" rx="8" fill="#ffffff" stroke="#2e7d32"/>
  <text x="740" y="204" class="t" fill="#226022">5 &#183; Contrafactuales (DiCE)</text>
  <text x="740" y="226" class="m">argmin&#8339;&#39; yloss(f(x&#39;),y*) + &#955;&#183;d(x,x&#39;)</text>
  <text x="740" y="248" class="n">&#191;qu&#233; cambio m&#237;nimo voltea</text>
  <text x="740" y="266" class="n">la decisi&#243;n? (recurso accionable)</text>
  <text x="740" y="292" class="n">validez &#183; dispersi&#243;n &#183; proximidad</text>
  <text x="740" y="312" class="n">diversidad de soluciones</text>
  <text x="740" y="344" class="m" fill="#b8860b">cambios pueden ser irreales</text>
  <text x="740" y="362" class="m" fill="#b8860b">si las variables se correlacionan</text>

  <line x1="540" y1="394" x2="540" y2="414" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="36" y="416" width="1008" height="86" rx="10" fill="#f3eaf1" stroke="#7a3b6b" stroke-width="1.6"/>
  <text x="52" y="440" class="t" fill="#7a3b6b">L&#237;mite causal com&#250;n</text>
  <text x="52" y="462" class="n">todos estos m&#233;todos describen el modelo sobre la distribuci&#243;n observada: siguen en el nivel asociacional</text>
  <text x="52" y="482" class="n">un contrafactual del modelo no es un contrafactual causal; intervenir requiere el operador do(&#183;)</text>

  <line x1="540" y1="502" x2="540" y2="522" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="36" y="524" width="1008" height="40" rx="8" fill="#eef1f7" stroke="#0b2a5b" stroke-width="1.5"/>
  <text x="52" y="549" class="q">Continuaci&#243;n &#8594; Cuaderno 04: l&#237;mites causales de SHAP (Causal SHAP / do-SHAP) y entrada a la inferencia causal.</text>
</svg>
