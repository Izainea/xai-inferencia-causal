<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <style>
      .h{font-size:21px;font-weight:700;fill:#2e7d32}
      .s{font-size:13px;fill:#48506a}
      .t{font-size:15px;font-weight:700;fill:#14532d}
      .n{font-size:12px;fill:#1b2440}
      .m{font-size:11.5px;font-style:italic;fill:#14532d}
      .q{font-size:12.5px;fill:#14532d}
    </style>
  </defs>
  <rect width="1080" height="600" fill="#ffffff"/>
  <text x="36" y="38" class="h">Cuaderno 05 &#183; Resultados potenciales y el experimento NSW &#8212; flujo</text>
  <text x="36" y="60" class="s">Secci&#243;n 2 del curso: el lenguaje formal de la inferencia causal</text>

  <rect x="36" y="78" width="1008" height="92" rx="10" fill="#eaf4ea" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="52" y="102" class="t">Secci&#243;n 1 &#183; Marco de resultados potenciales (Rubin)</text>
  <text x="52" y="124" class="m">Y&#7522;(0), Y&#7522;(1) &#183; observado Y&#7522; = T&#7522;Y&#7522;(1)+(1-T&#7522;)Y&#7522;(0) &#183; problema fundamental: solo se ve uno</text>
  <text x="52" y="144" class="n">estimandos ATE, ATT, ATC &#183; SUTVA</text>
  <text x="52" y="162" class="m">Prop. 1.1: diferencia ingenua = ATT + sesgo de selecci&#243;n  (con demostraci&#243;n)</text>

  <line x1="540" y1="170" x2="540" y2="190" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="36" y="192" width="1008" height="84" rx="10" fill="#dbe7ff" stroke="#1f4e9c" stroke-width="1.6"/>
  <text x="52" y="216" class="t" fill="#10245c">Secci&#243;n 2 &#183; Identificaci&#243;n por aleatorizaci&#243;n</text>
  <text x="52" y="238" class="m">ignorabilidad {Y(0),Y(1)} &#8869; T  &#183;  positividad 0 &lt; P(T=1|X) &lt; 1</text>
  <text x="52" y="258" class="m">Prop. 2.1: si T &#8869; {Y(0),Y(1)} entonces ATE = E[Y|T=1] - E[Y|T=0]  (con demostraci&#243;n)</text>

  <line x1="540" y1="276" x2="540" y2="296" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="36" y="298" width="498" height="150" rx="10" fill="#eaf4ea" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="52" y="322" class="t">Secci&#243;n 3 &#183; NSW (experimento)</text>
  <text x="52" y="344" class="n">diferencia de medias + IC (regresi&#243;n)</text>
  <text x="52" y="364" class="n">balance de covariables (SMD &#8776; 0)</text>
  <text x="52" y="392" class="m" fill="#226022">ATE experimental &#8776; +$886</text>
  <text x="52" y="416" class="n">la aleatorizaci&#243;n garantiza ignorabilidad</text>
  <text x="52" y="436" class="n">y positividad por dise&#241;o</text>

  <rect x="546" y="298" width="498" height="150" rx="10" fill="#fdecea" stroke="#c0392b" stroke-width="1.6"/>
  <text x="562" y="322" class="t" fill="#922b21">Secci&#243;n 4 &#183; Desaf&#237;o de LaLonde (observacional)</text>
  <text x="562" y="344" class="n">se reemplaza el control por CPS / PSID</text>
  <text x="562" y="364" class="n">balance ahora p&#233;simo (SMD grandes)</text>
  <text x="562" y="392" class="m" fill="#922b21">ATE ingenuo: CPS &#8722;$8.870 &#183; PSID &#8722;$15.578</text>
  <text x="562" y="416" class="n">ajuste por regresi&#243;n: ayuda parcial</text>
  <text x="562" y="436" class="n">el sesgo viene de la confusi&#243;n</text>

  <line x1="540" y1="448" x2="540" y2="468" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="36" y="470" width="1008" height="46" rx="8" fill="#f3eaf1" stroke="#7a3b6b" stroke-width="1.6"/>
  <text x="52" y="498" class="n">Moraleja: en datos observacionales la identificaci&#243;n exige supuestos (ignorabilidad condicional) y saber QU&#201; ajustar.</text>

  <line x1="540" y1="516" x2="540" y2="536" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="36" y="538" width="1008" height="40" rx="8" fill="#eef1f7" stroke="#0b2a5b" stroke-width="1.5"/>
  <text x="52" y="563" class="q">Continuaci&#243;n &#8594; Cuaderno 06: DAGs y d-separaci&#243;n &#8212; qu&#233; variables ajustar (y cu&#225;les no).</text>
</svg>
