<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="740" viewBox="0 0 1160 740" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arroww" markerWidth="12" markerHeight="12" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#444"/>
    </marker>
    <style>
      .h{font-size:26px;font-weight:700;fill:#0b2a5b}
      .sub{font-size:14px;fill:#48506a}
      .blk{font-size:17px;font-weight:700}
      .nb{font-size:12.5px;fill:#1b2440}
      .tag{font-size:13px;font-weight:700;fill:#fff}
      .q{font-size:12px;fill:#48506a}
      .cap{font-size:12px;fill:#48506a}
    </style>
  </defs>

  <rect x="0" y="0" width="1160" height="740" fill="#ffffff"/>
  <text x="40" y="46" class="h">Inferencia Causal + IA Explicativa (XAI)</text>
  <text x="40" y="68" class="sub">Diez cuadernos reproducibles con datos abiertos &#183; material de apoyo del art&#237;culo</text>

  <rect x="40" y="92" width="250" height="120" rx="10" fill="#eef1f7" stroke="#0b2a5b" stroke-width="1.5"/>
  <text x="58" y="118" class="blk" fill="#0b2a5b">Datos abiertos</text>
  <text x="58" y="142" class="nb">&#8226; German Credit (UCI) — caso gu&#237;a</text>
  <text x="58" y="162" class="nb">&#8226; NSW / Lalonde (NBER) — benchmark</text>
  <text x="58" y="190" class="cap">src/data.py · cargadores reproducibles</text>

  <line x1="290" y1="152" x2="360" y2="152" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="360" y="92" width="760" height="120" rx="10" fill="#dbe7ff" stroke="#1f4e9c" stroke-width="1.8"/>
  <rect x="360" y="92" width="150" height="120" rx="10" fill="#1f4e9c"/>
  <text x="372" y="140" class="tag">SECCI&#211;N 1</text>
  <text x="372" y="160" class="tag">Explicabilidad</text>
  <text x="372" y="184" class="cap" fill="#dbe7ff">XAI y sus l&#237;mites</text>
  <text x="528" y="118" class="blk" fill="#1f4e9c">IA Explicativa (XAI)</text>
  <text x="528" y="142" class="nb">01 · Explicabilidad, interpretabilidad y causalidad (asociaci&#243;n &#8800; causa)</text>
  <text x="528" y="162" class="nb">02 · Explicaciones locales: SHAP y LIME</text>
  <text x="528" y="182" class="nb">03 · Globales y contrafactuales (DiCE)</text>
  <text x="528" y="202" class="nb">04 · L&#237;mites causales de SHAP (Causal SHAP / do-SHAP)</text>

  <path d="M740,212 L740,236" stroke="#444" stroke-width="2" marker-end="url(#arroww)"/>
  <text x="752" y="230" class="q">la explicaci&#243;n asociacional no responde preguntas de intervenci&#243;n</text>

  <rect x="360" y="240" width="760" height="140" rx="10" fill="#d9f2da" stroke="#2e7d32" stroke-width="1.8"/>
  <rect x="360" y="240" width="150" height="140" rx="10" fill="#2e7d32"/>
  <text x="372" y="288" class="tag">SECCI&#211;N 2</text>
  <text x="372" y="308" class="tag">Causalidad</text>
  <text x="372" y="332" class="cap" fill="#d9f2da">Fundamentos</text>
  <text x="528" y="266" class="blk" fill="#2e7d32">Inferencia causal</text>
  <text x="528" y="290" class="nb">05 · Resultados potenciales (Rubin), ATE/ATT — NSW</text>
  <text x="528" y="310" class="nb">06 · DAGs, d-separaci&#243;n, confusores y colisionadores</text>
  <text x="528" y="330" class="nb">07 · Estimaci&#243;n con DoWhy (identificar / estimar / refutar)</text>
  <text x="528" y="350" class="nb">08 · PSM · IPW · IV · DiD (experimental vs observacional)</text>

  <path d="M740,380 L740,404" stroke="#444" stroke-width="2" marker-end="url(#arroww)"/>
  <text x="752" y="398" class="q">del efecto promedio a los efectos por subgrupo y la equidad</text>

  <rect x="360" y="408" width="760" height="120" rx="10" fill="#fff1cc" stroke="#b8860b" stroke-width="1.8"/>
  <rect x="360" y="408" width="150" height="120" rx="10" fill="#b8860b"/>
  <text x="372" y="456" class="tag">SECCI&#211;N 3</text>
  <text x="372" y="476" class="tag">Integraci&#243;n</text>
  <text x="372" y="500" class="cap" fill="#fff1cc">Aplicaci&#243;n y &#233;tica</text>
  <text x="528" y="434" class="blk" fill="#8a6508">Causalidad explicable</text>
  <text x="528" y="458" class="nb">09 · Efectos heterog&#233;neos (EconML CATE) explicados con SHAP</text>
  <text x="528" y="478" class="nb">10 · Descubrimiento causal + recurso accionable + auditor&#237;a</text>
  <text x="528" y="506" class="cap">caso crediticio de extremo a extremo (cf. Takahashi et&#160;al., 2024)</text>

  <line x1="740" y1="528" x2="740" y2="560" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="560" width="760" height="60" rx="10" fill="#eef1f7" stroke="#0b2a5b" stroke-width="1.5"/>
  <text x="378" y="586" class="blk" fill="#0b2a5b">reports/figures/</text>
  <text x="378" y="606" class="cap">figuras y resultados reproducibles exportados desde los cuadernos</text>

  <line x1="540" y1="620" x2="540" y2="652" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="940" y1="620" x2="940" y2="652" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="652" width="360" height="58" rx="10" fill="#dbe7ff" stroke="#1f4e9c" stroke-width="1.5"/>
  <text x="378" y="678" class="blk" fill="#1f4e9c">Art&#237;culo</text>
  <text x="378" y="698" class="cap">Revista Comunicaciones en Estad&#237;stica</text>
  <rect x="760" y="652" width="360" height="58" rx="10" fill="#fff1cc" stroke="#b8860b" stroke-width="1.5"/>
  <text x="778" y="678" class="blk" fill="#8a6508">Material docente</text>
  <text x="778" y="698" class="cap">guías, contenidos y evaluaciones del espacio académico</text>
</svg>
