<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <style>
      .h{font-size:21px;font-weight:700;fill:#0b2a5b}
      .s{font-size:13px;fill:#48506a}
      .t{font-size:14.5px;font-weight:700;fill:#10245c}
      .n{font-size:11.5px;fill:#1b2440}
      .m{font-size:11px;font-style:italic;fill:#10245c}
      .q{font-size:12.5px;fill:#10245c}
    </style>
  </defs>
  <rect width="1080" height="600" fill="#ffffff"/>
  <text x="36" y="38" class="h">Cuaderno 10 &#183; Causalidad explicable de extremo a extremo + auditor&#237;a &#233;tica</text>
  <text x="36" y="60" class="s">el cierre: integrar todo el recorrido en una decisi&#243;n crediticia responsable</text>

  <!-- pipeline 5 cajas -->
  <rect x="30" y="86" width="196" height="120" rx="9" fill="#dbe7ff" stroke="#1f4e9c" stroke-width="1.6"/>
  <text x="44" y="108" class="t" fill="#1f4e9c">1 &#183; Modelo + Explicar</text>
  <text x="44" y="130" class="n">caja negra (XGBoost)</text>
  <text x="44" y="148" class="n">SHAP: por qu&#233; rechaza</text>
  <text x="44" y="172" class="m">Secci&#243;n 1 (XAI)</text>

  <rect x="234" y="86" width="196" height="120" rx="9" fill="#eaf4ea" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="248" y="108" class="t" fill="#226022">2 &#183; Recurso</text>
  <text x="248" y="130" class="n">DiCE: cambio m&#237;nimo</text>
  <text x="248" y="148" class="n">accionable para aprobar</text>
  <text x="248" y="172" class="m">recurso algor&#237;tmico</text>

  <rect x="438" y="86" width="196" height="120" rx="9" fill="#f3eaf1" stroke="#7a3b6b" stroke-width="1.6"/>
  <text x="452" y="108" class="t" fill="#7a3b6b">3 &#183; Chequeo causal</text>
  <text x="452" y="130" class="n">obs vs intervencional</text>
  <text x="452" y="148" class="n">&#191;usa proxies de un</text>
  <text x="452" y="166" class="n">atributo protegido?</text>
  <text x="452" y="186" class="m">Secci&#243;n 2 + nb04</text>

  <rect x="642" y="86" width="196" height="120" rx="9" fill="#fdecea" stroke="#c0392b" stroke-width="1.6"/>
  <text x="656" y="108" class="t" fill="#922b21">4 &#183; Auditor&#237;a de equidad</text>
  <text x="656" y="130" class="n">paridad demogr&#225;fica</text>
  <text x="656" y="148" class="n">igualaci&#243;n de odds</text>
  <text x="656" y="166" class="n">equidad contrafactual</text>
  <text x="656" y="186" class="m">imposibilidad conjunta</text>

  <rect x="846" y="86" width="204" height="120" rx="9" fill="#fff1cc" stroke="#b8860b" stroke-width="1.6"/>
  <text x="860" y="108" class="t" fill="#8a6508">5 &#183; Rendici&#243;n de cuentas</text>
  <text x="860" y="130" class="n">decisi&#243;n trazable,</text>
  <text x="860" y="148" class="n">explicable y auditada</text>
  <text x="860" y="166" class="n">mitigaci&#243;n de sesgo</text>
  <text x="860" y="186" class="m">IA responsable</text>

  <line x1="226" y1="146" x2="234" y2="146" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="430" y1="146" x2="438" y2="146" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="634" y1="146" x2="642" y2="146" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="838" y1="146" x2="846" y2="146" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <line x1="540" y1="206" x2="540" y2="236" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="120" y="238" width="380" height="120" rx="10" fill="#dbe7ff" stroke="#1f4e9c" stroke-width="1.6"/>
  <text x="300" y="262" class="t" fill="#1f4e9c" text-anchor="middle">Secci&#243;n 1 del curso</text>
  <text x="300" y="286" class="n" text-anchor="middle">IA EXPLICATIVA (XAI)</text>
  <text x="300" y="308" class="m" text-anchor="middle">explica el modelo, pero no el mundo</text>
  <text x="300" y="332" class="n" text-anchor="middle">SHAP &#183; LIME &#183; contrafactuales</text>

  <rect x="580" y="238" width="380" height="120" rx="10" fill="#eaf4ea" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="770" y="262" class="t" fill="#226022" text-anchor="middle">Secci&#243;n 2 del curso</text>
  <text x="770" y="286" class="n" text-anchor="middle">INFERENCIA CAUSAL</text>
  <text x="770" y="308" class="m" text-anchor="middle">responde &#191;por qu&#233;? y &#191;qu&#233; pasar&#237;a si...?</text>
  <text x="770" y="332" class="n" text-anchor="middle">potenciales &#183; DAGs &#183; estimaci&#243;n</text>

  <line x1="300" y1="358" x2="500" y2="404" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="770" y1="358" x2="580" y2="404" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <rect x="240" y="406" width="600" height="92" rx="10" fill="#fff1cc" stroke="#b8860b" stroke-width="1.7"/>
  <text x="540" y="430" class="t" fill="#8a6508" text-anchor="middle">Secci&#243;n 3 &#183; Causalidad EXPLICABLE y responsable</text>
  <text x="540" y="454" class="n" text-anchor="middle">explicar efectos causales (no predicciones) + auditar equidad</text>
  <text x="540" y="476" class="m" text-anchor="middle">una decisi&#243;n que se entiende, se justifica y se puede rendir cuentas</text>

  <line x1="540" y1="498" x2="540" y2="524" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="36" y="526" width="1008" height="40" rx="8" fill="#eef1f7" stroke="#0b2a5b" stroke-width="1.5"/>
  <text x="540" y="551" class="q" text-anchor="middle">Cierre del recorrido: de la correlaci&#243;n a la causa, con explicabilidad y &#233;tica.</text>
