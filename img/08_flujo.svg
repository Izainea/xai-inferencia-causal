<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <style>
      .h{font-size:21px;font-weight:700;fill:#2e7d32}
      .s{font-size:13px;fill:#48506a}
      .t{font-size:15px;font-weight:700;fill:#14532d}
      .n{font-size:12px;fill:#1b2440}
      .m{font-size:11.5px;font-style:italic;fill:#14532d}
      .q{font-size:12.5px;fill:#14532d}
    </style>
  </defs>
  <rect width="1080" height="600" fill="#ffffff"/>
  <text x="36" y="38" class="h">Cuaderno 08 &#183; M&#233;todos de estimaci&#243;n por dentro &#8212; flujo</text>
  <text x="36" y="60" class="s">cuatro familias para estimar efectos seg&#250;n los supuestos disponibles</text>

  <text x="36" y="92" class="t" fill="#226022">A &#183; Selecci&#243;n sobre observables (se asume ignorabilidad condicional)</text>
  <rect x="36" y="104" width="498" height="150" rx="10" fill="#eaf4ea" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="52" y="128" class="t">Secci&#243;n 1 &#183; Emparejamiento por propensi&#243;n (PSM)</text>
  <text x="52" y="150" class="m">e(X) = P(T=1 | X) &#183; teorema de balanceo (Rosenbaum&#8211;Rubin)</text>
  <text x="52" y="170" class="n">emparejar tratados y controles con e(X) similar</text>
  <text x="52" y="190" class="n">+ SOPORTE COM&#218;N (recorte) &#8594; impone positividad</text>
  <text x="52" y="214" class="m" fill="#226022">con dise&#241;o cuidadoso recupera el efecto de LaLonde</text>
  <text x="52" y="236" class="n">estima el ATT</text>

  <rect x="546" y="104" width="498" height="150" rx="10" fill="#eaf4ea" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="562" y="128" class="t">Secci&#243;n 2 &#183; Ponderaci&#243;n inversa (IPW)</text>
  <text x="562" y="150" class="m">pesos w = T/e + (1-T)/(1-e)</text>
  <text x="562" y="170" class="n">crea una pseudo-poblaci&#243;n balanceada</text>
  <text x="562" y="190" class="n">estimador de Horvitz&#8211;Thompson</text>
  <text x="562" y="214" class="m">pesos estabilizados &#183; sensible a e&#8776;0,1</text>
  <text x="562" y="236" class="n">estima el ATE</text>

  <text x="36" y="288" class="t" fill="#922b21">B &#183; Cuando hay confusi&#243;n NO observada o estructura temporal</text>
  <rect x="36" y="300" width="498" height="150" rx="10" fill="#fdecea" stroke="#c0392b" stroke-width="1.6"/>
  <text x="52" y="324" class="t" fill="#922b21">Secci&#243;n 3 &#183; Variables instrumentales (IV)</text>
  <text x="52" y="346" class="m">instrumento Z: Z&#8594;T, Z&#8869;Y salvo v&#237;a T, Z&#8869; confusor</text>
  <text x="52" y="366" class="n">m&#237;nimos cuadrados en dos etapas (2SLS)</text>
  <text x="52" y="386" class="n">identifica aun con confusor NO medido</text>
  <text x="52" y="410" class="m">estima un efecto local (LATE)</text>

  <rect x="546" y="300" width="498" height="150" rx="10" fill="#fdecea" stroke="#c0392b" stroke-width="1.6"/>
  <text x="562" y="324" class="t" fill="#922b21">Secci&#243;n 4 &#183; Diferencias en diferencias (DiD)</text>
  <text x="562" y="346" class="m">(Y&#8323;-Y&#8320;)&#7707; &#8722; (Y&#8323;-Y&#8320;)&#7580;</text>
  <text x="562" y="366" class="n">usa dos periodos (re75 &#8594; re78)</text>
  <text x="562" y="386" class="n">elimina la confusi&#243;n constante en el tiempo</text>
  <text x="562" y="410" class="m">supuesto: tendencias paralelas</text>

  <line x1="540" y1="458" x2="540" y2="482" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="36" y="484" width="1008" height="46" rx="8" fill="#f3eaf1" stroke="#7a3b6b" stroke-width="1.5"/>
  <text x="52" y="512" class="n">cada familia descansa en un supuesto distinto; el experimento (nb05) sigue siendo el patr&#243;n para juzgarlas.</text>

  <line x1="540" y1="530" x2="540" y2="550" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="36" y="552" width="1008" height="40" rx="8" fill="#eef1f7" stroke="#0b2a5b" stroke-width="1.5"/>
  <text x="52" y="577" class="q">Continuaci&#243;n &#8594; Cuaderno 09: efectos heterog&#233;neos (CATE) con EconML, y explicarlos con SHAP.</text>
</svg>
