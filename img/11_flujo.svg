<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <style>
      .h{font-size:21px;font-weight:700;fill:#1b5e20}
      .s{font-size:13px;fill:#48506a}
      .t{font-size:15px;font-weight:700;fill:#14532d}
      .n{font-size:12px;fill:#1b2440}
      .m{font-size:11.5px;font-style:italic;fill:#14532d}
      .q{font-size:12.5px;fill:#14532d}
    </style>
  </defs>
  <rect width="1080" height="600" fill="#ffffff"/>
  <text x="36" y="38" class="h">Cuaderno 11 &#183; Evidencia con datos abiertos colombianos &#8212; flujo</text>
  <text x="36" y="60" class="s">el recorrido completo (XAI &#8594; causalidad &#8594; &#233;tica) con datos 100% de Colombia</text>

  <!-- Dos fuentes -->
  <rect x="36" y="82" width="498" height="96" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.6"/>
  <text x="52" y="106" class="t" fill="#0d47a1">ICFES Saber 11 (datos.gov.co)</text>
  <text x="52" y="128" class="m">caso OBSERVACIONAL &#8212; an&#225;logo de German Credit</text>
  <text x="52" y="148" class="n">puntaje + nivel socioecon&#243;mico + colegio (oficial/privado)</text>
  <text x="52" y="167" class="n">privado 293 vs oficial 248: &#191;efecto del colegio o del estrato?</text>

  <rect x="546" y="82" width="498" height="96" rx="10" fill="#eaf4ea" stroke="#2e7d32" stroke-width="1.6"/>
  <text x="562" y="106" class="t">Vouchers PACES (Angrist et al. 2002)</text>
  <text x="562" y="128" class="m">caso EXPERIMENTAL &#8212; an&#225;logo de NSW/LaLonde</text>
  <text x="562" y="148" class="n">loter&#237;a aleatoria de becas &#8594; verdad causal de referencia</text>
  <text x="562" y="167" class="n">ganar la loter&#237;a: +11 pp en terminar 8.&#186; grado</text>

  <line x1="285" y1="178" x2="285" y2="206" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="795" y1="178" x2="795" y2="206" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Bloques metodologicos -->
  <rect x="36" y="208" width="498" height="150" rx="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.6"/>
  <text x="52" y="232" class="t" fill="#4a148c">XAI y su l&#237;mite causal</text>
  <text x="52" y="254" class="n">SHAP: el estrato es &#171;lo m&#225;s importante&#187; del modelo</text>
  <text x="52" y="274" class="n">obs vs intervencional &#8594; &#191;cu&#225;nto es proxy y no causa?</text>
  <text x="52" y="296" class="t" fill="#4a148c">Causalidad observacional</text>
  <text x="52" y="318" class="n">DAG + puerta trasera: efecto de sector ajustando por SES</text>
  <text x="52" y="338" class="m">la &#171;importancia&#187; no es el efecto causal</text>

  <rect x="546" y="208" width="498" height="150" rx="10" fill="#fff1cc" stroke="#b8860b" stroke-width="1.6"/>
  <text x="562" y="232" class="t" fill="#8a6508">Causalidad experimental (verdad)</text>
  <text x="562" y="254" class="n">loter&#237;a = aleatorizaci&#243;n &#8594; efecto sin sesgo</text>
  <text x="562" y="274" class="n">sesgo de selecci&#243;n (beca usada) vs efecto (loter&#237;a)</text>
  <text x="562" y="296" class="n">vouch0 como INSTRUMENTO de asistir a privado (IV/LATE)</text>
  <text x="562" y="318" class="t" fill="#8a6508">Reencuentro: CATE + SHAP</text>
  <text x="562" y="338" class="m">&#191;a qui&#233;n beneficia m&#225;s el voucher?</text>

  <line x1="285" y1="358" x2="430" y2="404" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <line x1="795" y1="358" x2="650" y2="404" stroke="#555" stroke-width="2" marker-end="url(#a)"/>

  <!-- Etica -->
  <rect x="200" y="406" width="680" height="96" rx="10" fill="#fdecea" stroke="#c0392b" stroke-width="1.7"/>
  <text x="540" y="430" class="t" fill="#922b21" text-anchor="middle">Despliegue responsable: equidad sobre el caso colombiano</text>
  <text x="540" y="452" class="n" text-anchor="middle">brechas por estrato, regi&#243;n, sector (oficial/privado) y g&#233;nero</text>
  <text x="540" y="472" class="n" text-anchor="middle">imposibilidad conjunta &#183; equidad contrafactual con proxies del estrato</text>
  <text x="540" y="492" class="m" text-anchor="middle">qu&#233; variable es proxy ileg&#237;timo y qu&#233; causa: lo decide el grafo, no la estad&#237;stica</text>

  <line x1="540" y1="502" x2="540" y2="528" stroke="#555" stroke-width="2" marker-end="url(#a)"/>
  <rect x="36" y="530" width="1008" height="44" rx="8" fill="#eef1f7" stroke="#0b2a5b" stroke-width="1.5"/>
  <text x="540" y="557" class="q" text-anchor="middle">Aporte: primer recorrido reproducible XAI&#8596;causalidad&#8596;equidad sobre datos abiertos colombianos (Saber 11 + PACES).</text>
</svg>
